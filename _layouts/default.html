<!DOCTYPE html>
<html>
<head>
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://unpkg.com/7.css" />
    <style>
        body {
            background-color: #ece9d8;
            padding: 40px;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .blog-window {
            max-width: 900px;
            margin: 0 auto;
        }
        .nav-bar {
            background: #f0f0f0;
            padding: 8px 16px;
            border-bottom: 1px solid #ccc;
        }
        .nav-bar a {
            margin-right: 20px;
            text-decoration: none;
            color: #000;
        }
        .nav-bar a:hover {
            text-decoration: underline;
        }
        .post-list {
            list-style: none;
            padding: 0;
        }
        .post-list li {
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .post-list li:last-child {
            border-bottom: none;
        }
        .post-date {
            color: #666;
            font-size: 14px;
            margin-right: 16px;
        }
        .category-tag {
            background: #e0e0e0;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox-plus-jquery.min.js"></script>
</head>
<body>
    <div class="blog-window">
        <div class="window">
            <div class="title-bar">
                <div class="title-bar-text">{{ site.title }}</div>
                <div class="title-bar-controls">
                    <button aria-label="Close" onclick="goBack()"></button>
                </div>
            </div>
            
            <div class="nav-bar">
                <a href="/"> 首页</a>
                <a href="/categories.html"> 分类</a>
                <a href="/gallery.html">画廊</a>
                <a href="/about.html"> 关于</a>
            </div>
            
            <div class="window-body">
                {{ content }}
            </div>
            
            <div class="status-bar" style="background: #f0f0f0; padding: 4px 8px; border-top: 1px solid #ccc; font-size: 12px; color: #666;">
                {{ site.description }} | © {{ site.time | date: '%Y' }}
            </div>
        </div>
    </div>
    <script>
        function goBack() {
            if (confirm("确定要返回上一页吗？")) {
                window.history.back();
            }
        }
    </script>
</body>
</html>
