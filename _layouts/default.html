<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <div class="wrapper">
        <header>
            <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
            <p>{{ site.description }}</p>
        </header>
        <section>
            {{ content }}
        </section>
        <footer>
            <p>© {{ site.time | date: '%Y' }} {{ site.title }}</p>
        </footer>
    </div>
</body>
</html>
